[oauth]
# Durable, set-and-forget auth (recommended). From your registered SmartApp.
# See README for how to create the OAuth SmartApp with the SmartThings CLI.
client_id = PASTE_CLIENT_ID_HERE
client_secret = PASTE_CLIENT_SECRET_HERE
# Must match a redirect URI you registered on the SmartApp.
redirect_uri = http://localhost:8910/callback
# Scope needed to read device status.
scope = r:devices:*
# Where the auto-refreshing tokens are stored (created by authorize.py).
token_store = tokens.json

[smartthings]
# Leave 'token' blank when using OAuth above. Only fill it for a quick static
# test with a Personal Access Token (expires fast).
token =
# Door sensor device ID. Run: python list_devices.py YOUR_TOKEN
device_id = PASTE_DEVICE_ID_HERE
# How often (seconds) to check the door state.
poll_interval = 3

[mediamonkey]
# Full path to the MediaMonkey executable.
executable_path = C:\Program Files (x86)\MediaMonkey 5\MediaMonkey.exe
# Full path to the playlist (.m3u) to play when the door closes.
playlist_path = C:\Users\you\Music\Playlists\door.m3u
